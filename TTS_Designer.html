<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTS UI Designer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.toolbar { display: flex; align-items: center; gap: 10px; padding: 8px 16px; background: #16213e; border-bottom: 1px solid #0f3460; flex-shrink: 0; flex-wrap: wrap; }
.toolbar button, .toolbar select { background: #0f3460; color: #fff; border: 1px solid #1a5276; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.toolbar button:hover { background: #1a5276; }
.toolbar label { font-size: 13px; color: #a0a0c0; }
.main { display: flex; flex: 1; overflow: hidden; }
.panel { background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; flex-shrink: 0; }
.panel-left { width: 260px; }
.panel-right { width: 300px; border-right: none; border-left: 1px solid #0f3460; }
.panel-header { padding: 8px 12px; font-size: 13px; font-weight: 600; background: #0f3460; color: #a0c4ff; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
.panel-content { flex: 1; overflow-y: auto; padding: 8px; }
.asset-cat { margin-bottom: 12px; }
.asset-cat-title { font-size: 12px; color: #7a8aaa; padding: 4px 0; margin-bottom: 4px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
.asset-cat-title:hover { color: #a0c4ff; }
.asset-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.asset-grid img { width: 40px; height: 40px; object-fit: contain; cursor: grab; border: 1px solid transparent; border-radius: 3px; background: #0d1b2a; padding: 2px; }
.asset-grid img:hover { border-color: #4a7aaa; background: #1a2a4a; }
.search-box { width: 100%; padding: 6px 8px; background: #0d1b2a; border: 1px solid #1a5276; color: #fff; border-radius: 4px; font-size: 13px; margin-bottom: 8px; }
.search-box::placeholder { color: #5a6a8a; }
.canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: #0d1117; position: relative; overflow: hidden; }
.canvas { position: relative; background: #1a1a2e; box-shadow: 0 0 40px rgba(0,0,0,0.5); overflow: hidden; }
.canvas-element { position: absolute; cursor: move; user-select: none; }
.canvas-element:hover { outline: 2px solid #4a7aaa; outline-offset: -1px; }
.canvas-element.selected { outline: 2px solid #ffaa33; outline-offset: -1px; z-index: 9999 !important; }
.canvas-element img { width: 100%; height: 100%; pointer-events: none; display: block; }
.canvas-element .text-content { width: 100%; height: 100%; overflow: hidden; word-wrap: break-word; pointer-events: none; padding: 4px; }
.resize-handle { position: absolute; width: 8px; height: 8px; background: #ffaa33; border: 1px solid #fff; border-radius: 1px; z-index: 10; }
.resize-handle.nw { top: -4px; left: -4px; cursor: nw-resize; }
.resize-handle.ne { top: -4px; right: -4px; cursor: ne-resize; }
.resize-handle.sw { bottom: -4px; left: -4px; cursor: sw-resize; }
.resize-handle.se { bottom: -4px; right: -4px; cursor: se-resize; }
.prop-group { margin-bottom: 10px; }
.prop-group label { display: block; font-size: 11px; color: #7a8aaa; margin-bottom: 2px; }
.prop-group input, .prop-group select, .prop-group textarea { width: 100%; padding: 4px 6px; background: #0d1b2a; border: 1px solid #1a5276; color: #fff; border-radius: 3px; font-size: 12px; }
.prop-group textarea { height: 50px; resize: vertical; }
.prop-row { display: flex; gap: 6px; }
.prop-row>* { flex: 1; }
.prop-row .prop-group { flex: 1; }
.layer-list { font-size: 12px; }
.layer-item { display: flex; align-items: center; gap: 6px; padding: 3px 6px; cursor: pointer; border-radius: 3px; }
.layer-item:hover { background: #1a2a4a; }
.layer-item.active { background: #0f3460; }
.layer-item .thumb { width: 24px; height: 24px; object-fit: contain; background: #0d1b2a; border-radius: 2px; flex-shrink: 0; }
.layer-item .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.layer-item .btn { cursor: pointer; color: #7a8aaa; font-size: 11px; padding: 1px 4px; }
.layer-item .btn:hover { color: #ff6666; }
.empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #3a4a6a; text-align: center; padding: 20px; font-size: 13px; }
.color-picker { display: flex; gap: 4px; flex-wrap: wrap; }
.color-picker button { width: 20px; height: 20px; border: 1px solid #333; border-radius: 2px; cursor: pointer; padding: 0; }
.color-picker button:hover { border-color: #ffaa33; }
.color-picker button.active { border-color: #fff; outline: 2px solid #ffaa33; }
.status-badge { font-size: 11px; padding: 3px 10px; border-radius: 10px; display: flex; align-items: center; gap: 5px; }
.status-badge.synced { background: #1a3a2a; color: #4ade80; border: 1px solid #2a5a3a; }
.status-badge.unsaved { background: #3a2a1a; color: #fbbf24; border: 1px solid #5a4a2a; }
.status-badge.saving { background: #1a2a3a; color: #60a5fa; border: 1px solid #2a4a6a; }
.status-badge.error { background: #3a1a1a; color: #f87171; border: 1px solid #5a2a2a; }
.status-badge .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.status-badge.synced .dot { background: #4ade80; }
.status-badge.unsaved .dot { background: #fbbf24; }
.status-badge.saving .dot { background: #60a5fa; animation: pulse 0.8s infinite; }
.status-badge.error .dot { background: #f87171; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.toolbar-divider { width: 1px; height: 24px; background: #0f3460; }
.coords-display { font-size: 11px; color: #5a6a8a; padding: 2px 8px; background: #0d1b2a; border-radius: 3px; font-family: monospace; }
.element-count { font-size: 11px; color: #5a6a8a; }
.ts-ribbon { position: absolute; top: 0; left: 0; right: 0; height: 22px; background: #0f3460; display: flex; align-items: center; padding: 0 8px; font-size: 10px; color: #5a7aaa; gap: 8px; z-index: 99999; pointer-events: none; }
.ts-ribbon span { pointer-events: auto; }
.grid-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; background-image: radial-gradient(circle, rgba(79, 122, 170, 0.08) 1px, transparent 1px); background-size: 20px 20px; }
</style>
</head>
<body>

<div class="toolbar">
    <button onclick="addText()">+ Text</button>
    <button onclick="addImage()">+ Image</button>
    <button onclick="document.getElementById('fileInput').click()">Upload</button>
    <input id="fileInput" type="file" accept="image/png,image/jpeg,image/gif,image/webp" style="display:none" onchange="handleFileUpload(event)">
    <div class="toolbar-divider"></div>
    <label>W:</label><input id="canvasW" type="number" value="1920" style="width:60px" onchange="resizeCanvas()">
    <label>H:</label><input id="canvasH" type="number" value="1080" style="width:60px" onchange="resizeCanvas()">
    <button onclick="resizeCanvas()">Resize</button>
    <div class="toolbar-divider"></div>
    <button onclick="exportXML()">Export XML</button>
    <button onclick="exportLua()">Export Lua</button>
    <button onclick="copyData()">Copy Data</button>
    <button onclick="pasteData()">Paste Data</button>
    <button onclick="saveLayout()">Save</button>
    <button onclick="loadLayout()">Load</button>
    <div class="toolbar-divider"></div>
    <button onclick="saveToFile()">Save to File</button>
    <button onclick="document.getElementById('loadFileInput').click()">Load from File</button>
    <input id="loadFileInput" type="file" accept=".json" style="display:none" onchange="loadFromFile(event)">
    <button onclick="clearCanvas()" style="color:#ff6666;">Clear</button>
    <div class="toolbar-divider"></div>
    <span id="statusBadge" class="status-badge synced"><span class="dot"></span> Synced</span>
    <span class="element-count" id="elementCount">0 elements</span>
</div>

<div class="main">
    <div class="panel panel-left">
        <div class="panel-header">Assets</div>
        <div class="panel-content">
            <input class="search-box" id="pokemonSearch" placeholder="Search Pokemon..." oninput="showPokemonResults()">
            <div class="asset-cat">
                <div class="asset-cat-title" onclick="toggleCat('catTypes')">&#x25BC; Type Icons</div>
                <div id="catTypes" class="asset-grid"></div>
            </div>
            <div class="asset-cat">
                <div class="asset-cat-title" onclick="toggleCat('catPanels')">&#x25BC; Panels & UI</div>
                <div id="catPanels" class="asset-grid"></div>
            </div>
            <div class="asset-cat">
                <div class="asset-cat-title" onclick="toggleCat('catPokemon')">&#x25BC; Pokemon Cards</div>
                <div id="catPokemon" class="asset-grid"></div>
            </div>
        </div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
        <div class="canvas" id="canvas" ondrop="onDrop(event)" ondragover="onDragOver(event)">
            <div class="grid-overlay"></div>
        </div>
    </div>

    <div class="panel panel-right">
        <div class="panel-header">Properties</div>
        <div class="panel-content" id="propsPanel">
            <div class="empty-state">Select an element to edit its properties</div>
        </div>
        <div class="panel-header" style="border-top:1px solid #0f3460;">Layers</div>
        <div class="panel-content" id="layerPanel"></div>
    </div>
</div>

<script>
const GIT_BASE = 'https://raw.githubusercontent.com/NommerTay/Poke-Roller/master';
const TYPES = ['bug','dark','dragon','electric','fairy','fighting','fire','flying','ghost','grass','ground','ice','normal','poison','psychic','rock','steel','water'];
const PANELS = [
    { name: 'DEX PANEL', file: 'Pokemon%20Assets/DEX%20PANEL.png' },
    { name: 'DEX NEXT', file: 'Pokemon%20Assets/DEX%20NEXT.png' },
    { name: 'BENCY', file: 'BENCY.png' },
];
const POKEMON_LIST_URL = GIT_BASE + '/Pokemon%20Assets/Slot%20Images/';

let elements = [];
let nextId = 1;
let selectedId = null;
let dragData = null;
let dirty = false;
let saveTimer = null;
let fsFileHandle = null;
let fsFileSupported = false;

const STATUS = { SYNCED: 'synced', UNSAVED: 'unsaved', SAVING: 'saving', ERROR: 'error' };

// ── File System Access API ──────────────────────────────────
async function initFileSystemAccess() {
    fsFileSupported = 'showDirectoryPicker' in window;
    if (!fsFileSupported) return;
    try {
        const saved = localStorage.getItem('tts_fs_handle');
        if (saved) {
            const handles = [];
            const stored = JSON.parse(saved);
            for (const entry of stored) {
                if (entry.kind === 'file') {
                    try {
                        const perm = await navigator.storage.getDirectory();
                    } catch(e) {}
                }
            }
        }
        const storedHandle = localStorage.getItem('tts_fs_file_handle');
        if (storedHandle) {
            try {
                const fileData = JSON.parse(storedHandle);
                if (fileData.id) {
                    fsFileHandle = await retrieveFileHandle(fileData);
                    if (fsFileHandle) {
                        const perm = await fsFileHandle.queryPermission({ mode: 'readwrite' });
                        if (perm === 'granted') {
                            const data = await loadFromFileHandle(fsFileHandle);
                            if (data) return data;
                        }
                    }
                }
            } catch(e) {}
        }
    } catch(e) {}
    return null;
}

async function retrieveFileHandle(data) {
    if (!data.id) return null;
    try {
        const root = await navigator.storage.getDirectory();
        const draft = await root.getFileHandle(data.name, { create: false });
        return draft;
    } catch(e) {
        return null;
    }
}

async function requestFileSave() {
    if (!fsFileSupported) {
        setStatus(STATUS.ERROR, 'File API not supported in this browser');
        return false;
    }
    try {
        const handle = await window.showSaveFilePicker({
            suggestedName: '_designer_live_state.json',
            types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
            startIn: 'documents',
        });
        const perm = await handle.queryPermission({ mode: 'readwrite' });
        if (perm !== 'granted') {
            const granted = await handle.requestPermission({ mode: 'readwrite' });
            if (granted !== 'granted') {
                setStatus(STATUS.ERROR, 'Permission denied for file save');
                return false;
            }
        }
        fsFileHandle = handle;
        try {
            localStorage.setItem('tts_fs_file_handle', JSON.stringify({ name: handle.name, id: Date.now() }));
        } catch(e) {}
        return true;
    } catch(e) {
        if (e.name !== 'AbortError' && e.name !== 'SecurityError') {
            setStatus(STATUS.ERROR, 'Could not access file system');
        }
        return false;
    }
}

async function loadFromFileHandle(handle) {
    try {
        const file = await handle.getFile();
        const text = await file.text();
        if (!text.trim()) return null;
        return JSON.parse(text);
    } catch(e) {
        return null;
    }
}

async function writeToFileHandle(handle, data) {
    try {
        const writable = await handle.createWritable();
        await writable.write(JSON.stringify(data, null, 2));
        await writable.close();
        return true;
    } catch(e) {
        return false;
    }
}

// ── Server API ──────────────────────────────────────────────
async function serverSave(data) {
    try {
        const resp = await fetch('/api/state', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        return resp.ok;
    } catch(e) {
        return false;
    }
}

async function serverLoad() {
    try {
        const resp = await fetch('/api/state?_=' + Date.now());
        if (resp.ok) {
            return await resp.json();
        }
    } catch(e) {}
    return null;
}

// ── Live State Auto-Save ────────────────────────────────────
function markDirty() {
    if (!dirty) {
        dirty = true;
        setStatus(STATUS.UNSAVED, 'Unsaved changes');
    }
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(() => autoSave(), 1000);
    updateElementCount();
}

function setStatus(state, msg) {
    const badge = document.getElementById('statusBadge');
    badge.className = 'status-badge ' + state;
    const dot = badge.querySelector('.dot');
    if (state === STATUS.SYNCED) badge.innerHTML = '<span class="dot"></span> ' + (msg || 'Synced');
    else if (state === STATUS.UNSAVED) badge.innerHTML = '<span class="dot"></span> ' + (msg || 'Unsaved');
    else if (state === STATUS.SAVING) badge.innerHTML = '<span class="dot"></span> ' + (msg || 'Saving...');
    else if (state === STATUS.ERROR) badge.innerHTML = '<span class="dot"></span> ' + (msg || 'Error');
}

function updateElementCount() {
    document.getElementById('elementCount').textContent = elements.length + ' element' + (elements.length !== 1 ? 's' : '');
}

async function autoSave() {
    saveTimer = null;
    if (!dirty) return;
    setStatus(STATUS.SAVING, 'Saving...');

    const data = {
        elements: elements.map(stripElement),
        nextId,
        canvasW: document.getElementById('canvasW').value,
        canvasH: document.getElementById('canvasH').value,
        _timestamp: new Date().toISOString(),
        _version: '2.0'
    };

    let saved = false;

    // Save to localStorage
    try {
        localStorage.setItem('tts_designer_layout', JSON.stringify({
            elements: data.elements,
            nextId: data.nextId,
            canvasW: data.canvasW,
            canvasH: data.canvasH,
            _timestamp: data._timestamp,
            _version: data._version
        }));
        saved = true;
    } catch(e) {}

    // Save via server API
    const serverOk = await serverSave(data);
    if (serverOk) saved = true;

    // Save to file via File System Access API
    if (fsFileHandle) {
        const ok = await writeToFileHandle(fsFileHandle, data);
        if (ok) saved = true;
    }

    dirty = false;
    setStatus(saved ? STATUS.SYNCED : STATUS.UNSAVED, saved ? 'Auto-saved' : 'localStorage only');
}

async function setupLiveSave() {
    // Try loading from server API first
    const apiData = await serverLoad();
    if (apiData && apiData.elements && apiData.elements.length > 0) {
        applyLayoutData(apiData);
        setStatus(STATUS.SYNCED, 'Loaded from server');
        return;
    }

    // Try loading from File System API second
    const fsData = await initFileSystemAccess();
    if (fsData && fsData.elements) {
        applyLayoutData(fsData);
        setStatus(STATUS.SYNCED, 'Loaded from live file');
        return;
    }

    // Fallback: load from localStorage
    const lsData = localStorage.getItem('tts_designer_layout');
    if (lsData) {
        try {
            const obj = JSON.parse(lsData);
            if (obj.elements && Array.isArray(obj.elements)) {
                applyLayoutData(obj);
                setStatus(STATUS.SYNCED, 'Loaded from storage');
            }
        } catch(e) {}
    }

    // Check if file exists next to this HTML (fetch approach)
    try {
        const resp = await fetch('_designer_live_state.json?_=' + Date.now());
        if (resp.ok) {
            const data = await resp.json();
            if (data && data.elements && Array.isArray(data.elements) && data.elements.length > 0) {
                if (!lsData || confirm('Found _designer_live_state.json with ' + data.elements.length + ' elements. Load it?')) {
                    applyLayoutData(data);
                    setStatus(STATUS.SYNCED, 'Loaded from live file');
                }
            }
        }
    } catch(e) {}

    // Offer to set up file system save
    if (fsFileSupported && !fsFileHandle) {
        setTimeout(() => {
            if (confirm('Enable auto-save to file? This lets AI see your design live.\n\nClick OK to choose where to save _designer_live_state.json')) {
                requestFileSave().then(ok => {
                    if (ok) {
                        markDirty();
                        setTimeout(() => autoSave(), 500);
                    }
                });
            }
        }, 1500);
    }
}

function applyLayoutData(obj) {
    elements = (obj.elements || []).map(el => {
        if (el.type === 'image' && !el.src) {
            el.src = resolveSrc(el);
        }
        return el;
    });
    nextId = obj.nextId || 1;
    selectedId = null;
    if (obj.canvasW) document.getElementById('canvasW').value = obj.canvasW;
    if (obj.canvasH) document.getElementById('canvasH').value = obj.canvasH;
    resizeCanvas();
    render();
}

// ── Asset Panel Init ──────────────────────────────────────
function initAssets() {
    const t = document.getElementById('catTypes');
    TYPES.forEach(type => {
        const img = document.createElement('img');
        img.src = GIT_BASE + '/Pokemon%20Assets/Types/' + type + '.png';
        img.title = 'type_' + type;
        img.draggable = true;
        img.ondragstart = e => e.dataTransfer.setData('text/plain', 'type_' + type);
        img.onclick = () => placeImage('type_' + type, GIT_BASE + '/Pokemon%20Assets/Types/' + type + '.png');
        t.appendChild(img);
    });

    const p = document.getElementById('catPanels');
    PANELS.forEach(panel => {
        const img = document.createElement('img');
        img.src = GIT_BASE + '/' + panel.file;
        img.title = panel.name;
        img.style.width = '60px';
        img.style.height = 'auto';
        img.draggable = true;
        img.ondragstart = e => e.dataTransfer.setData('text/plain', panel.name);
        img.onclick = () => placeImage(panel.name, GIT_BASE + '/' + panel.file);
        p.appendChild(img);
    });

    showPokemonResults();
}

let pokemonCache = [];
let pokemonLoaded = false;

async function loadPokemonList() {
    if (pokemonLoaded) return;
    try {
        const resp = await fetch('https://api.github.com/repos/NommerTay/Poke-Roller/contents/Pokemon%20Assets/Slot%20Images');
        const data = await resp.json();
        if (Array.isArray(data)) {
            pokemonCache = data.filter(f => f.name.endsWith('.png')).map(f => ({
                name: f.name.replace('.png',''),
                url: f.download_url
            }));
        }
        pokemonLoaded = true;
    } catch(e) {
        for (let i = 1; i <= 1025; i++) {
            const padded = String(i).padStart(3,'0');
            pokemonCache.push({ name: padded + '_pokemon', url: GIT_BASE + '/Pokemon%20Assets/Slot%20Images/' + padded + '_pokemon.png' });
        }
        pokemonLoaded = true;
    }
    showPokemonResults();
}

function showPokemonResults() {
    const q = document.getElementById('pokemonSearch').value.toLowerCase();
    const grid = document.getElementById('catPokemon');
    grid.innerHTML = '';
    const results = pokemonCache.filter(p => p.name.toLowerCase().includes(q)).slice(0, 50);
    results.forEach(p => {
        const img = document.createElement('img');
        img.src = p.url;
        img.title = p.name;
        img.onerror = () => { img.style.display = 'none'; };
        img.draggable = true;
        img.ondragstart = e => e.dataTransfer.setData('text/plain', 'poke_' + p.name);
        img.onclick = () => placeImage(p.name, p.url);
        grid.appendChild(img);
    });
    if (results.length === 0) grid.innerHTML = '<div style="color:#5a6a8a;font-size:12px;padding:8px;">No results</div>';
}

function toggleCat(id) {
    const el = document.getElementById(id);
    el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}

// ── Canvas ────────────────────────────────────────────────
function resizeCanvas() {
    const w = parseInt(document.getElementById('canvasW').value) || 1920;
    const h = parseInt(document.getElementById('canvasH').value) || 1080;
    const c = document.getElementById('canvas');
    c.style.width = w + 'px';
    c.style.height = h + 'px';
    fitCanvas();
}

function fitCanvas() {
    const wrap = document.getElementById('canvasWrap');
    const c = document.getElementById('canvas');
    const cw = parseInt(c.style.width) || 1920;
    const ch = parseInt(c.style.height) || 1080;
    const wrapW = wrap.clientWidth - 20;
    const wrapH = wrap.clientHeight - 20;
    const scale = Math.min(1, wrapW / cw, wrapH / ch);
    c.style.transform = 'scale(' + scale + ')';
    c.style.transformOrigin = 'center center';
}

window.addEventListener('resize', fitCanvas);

function onDragOver(e) { e.preventDefault(); }

function onDrop(e) {
    e.preventDefault();
    const data = e.dataTransfer.getData('text/plain');
    if (!data) return;
    const rect = document.getElementById('canvas').getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 1920;
    const y = ((e.clientY - rect.top) / rect.height) * 1080;
    if (data.startsWith('type_')) {
        const type = data.replace('type_','');
        placeImage('type_' + type, GIT_BASE + '/Pokemon%20Assets/Types/' + type + '.png', x-20, y-20, 40, 40);
    } else if (data.startsWith('poke_')) {
        const name = data.replace('poke_','');
        const item = pokemonCache.find(p => p.name === name);
        if (item) placeImage(name, item.url, x-50, y-70, 100, 140);
    } else {
        const panel = PANELS.find(p => p.name === data);
        if (panel) placeImage(panel.name, GIT_BASE + '/' + panel.file, x-100, y-100, 200, 140);
    }
}

function placeImage(name, url, x, y, w, h) {
    const id = nextId++;
    const el = {
        id: 'el' + id,
        type: 'image',
        name: name,
        src: url,
        tags: '',
        imgColor: '#ffffff',
        x: x || 100, y: y || 100,
        w: w || 100, h: h || 140,
        zIndex: elements.length + 1
    };
    if (x === undefined) {
        const c = document.getElementById('canvas');
        el.x = (parseInt(c.style.width) || 1920) / 2 - 50;
        el.y = (parseInt(c.style.height) || 1080) / 2 - 70;
    }
    elements.push(el);
    render();
    selectElement(id);
    markDirty();
    return el;
}

function addImage() {
    const id = nextId++;
    const el = {
        id: 'el' + id,
        type: 'image',
        name: 'Image ' + id,
        src: '',
        tags: '',
        imgColor: '#ffffff',
        x: 100, y: 100,
        w: 100, h: 140,
        zIndex: elements.length + 1
    };
    elements.push(el);
    render();
    selectElement(id);
    markDirty();
}

function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const dataUrl = e.target.result;
        const id = nextId++;
        const ext = file.name.split('.').pop();
        const el = {
            id: 'el' + id,
            type: 'image',
            name: file.name.replace('.' + ext, ''),
            src: dataUrl,
            tags: '',
            imgColor: '#ffffff',
            x: 100, y: 100,
            w: 100, h: 140,
            zIndex: elements.length + 1
        };
        elements.push(el);
        render();
        selectElement(id);
        markDirty();
    };
    reader.readAsDataURL(file);
    event.target.value = '';
}

function addText() {
    const id = nextId++;
    const el = {
        id: 'el' + id,
        type: 'text',
        name: 'Text ' + id,
        text: 'Sample Text',
        tags: '',
        font: 'Arial',
        size: 24,
        bold: false,
        italic: false,
        color: '#ffffff',
        align: 'center',
        x: 100, y: 100,
        w: 200, h: 40,
        zIndex: elements.length + 1
    };
    elements.push(el);
    render();
    selectElement(id);
    markDirty();
}

// ── Rendering ─────────────────────────────────────────────
function render() {
    const c = document.getElementById('canvas');
    const sorted = [...elements].sort((a,b) => a.zIndex - b.zIndex);
    c.innerHTML = '<div class="grid-overlay"></div>';
    sorted.forEach(el => {
        const div = document.createElement('div');
        div.className = 'canvas-element' + (el.id === selectedId ? ' selected' : '');
        div.id = el.id;
        div.style.left = el.x + 'px';
        div.style.top = el.y + 'px';
        div.style.width = el.w + 'px';
        div.style.height = el.h + 'px';
        div.style.zIndex = el.zIndex;
        div.onmousedown = e => { e.stopPropagation(); selectElement(el.id); startDrag(e, el.id); };

        if (el.type === 'image') {
            if (el.src) {
                const img = document.createElement('img');
                img.src = el.src;
                img.onerror = function() { this.style.display = 'none'; };
                if (el.imgColor && el.imgColor !== '#ffffff') {
                    img.style.filter = 'drop-shadow(0 0 0 ' + el.imgColor + ') saturate(2)';
                }
                div.appendChild(img);
            } else {
                div.style.background = '#2a3050';
                div.style.border = '1px dashed #4a7aaa';
                div.style.display = 'flex';
                div.style.alignItems = 'center';
                div.style.justifyContent = 'center';
                div.style.fontSize = '11px';
                div.style.color = '#7a8aaa';
                div.textContent = 'No image set';
            }
        } else if (el.type === 'text') {
            const tc = document.createElement('div');
            tc.className = 'text-content';
            tc.textContent = el.text;
            tc.style.fontFamily = el.font;
            tc.style.fontSize = el.size + 'px';
            tc.style.fontWeight = el.bold ? 'bold' : 'normal';
            tc.style.fontStyle = el.italic ? 'italic' : 'normal';
            tc.style.color = el.color;
            tc.style.textAlign = el.align;
            div.appendChild(tc);
        }

        if (el.id === selectedId) {
            ['nw','ne','sw','se'].forEach(pos => {
                const h = document.createElement('div');
                h.className = 'resize-handle ' + pos;
                h.onmousedown = e => { e.stopPropagation(); startResize(e, el.id, pos); };
                div.appendChild(h);
            });
        }

        c.appendChild(div);
    });
    updateLayers();
    updateProps();
}

// ── Selection ─────────────────────────────────────────────
function selectElement(id) {
    selectedId = id;
    render();
}

function deselectAll() {
    selectedId = null;
    render();
}

document.getElementById('canvas').onmousedown = () => deselectAll();

// ── Drag ──────────────────────────────────────────────────
let dragState = null;

function startDrag(e, id) {
    const el = elements.find(ev => ev.id === id);
    if (!el) return;
    dragState = { id, ox: e.clientX, oy: e.clientY, ex: el.x, ey: el.y };
    document.onmousemove = onDrag;
    document.onmouseup = stopDrag;
    e.preventDefault();
}

function onDrag(e) {
    if (!dragState) return;
    const dx = e.clientX - dragState.ox;
    const dy = e.clientY - dragState.oy;
    const el = elements.find(ev => ev.id === dragState.id);
    if (el) {
        el.x = Math.max(0, dragState.ex + dx);
        el.y = Math.max(0, dragState.ey + dy);
        render();
    }
}

function stopDrag() {
    if (dragState) markDirty();
    dragState = null;
    document.onmousemove = null;
    document.onmouseup = null;
}

// ── Resize ────────────────────────────────────────────────
let resizeState = null;

function startResize(e, id, pos) {
    const el = elements.find(ev => ev.id === id);
    if (!el) return;
    resizeState = { id, pos, ox: e.clientX, oy: e.clientY, ex: el.x, ey: el.y, ew: el.w, eh: el.h };
    document.onmousemove = onResize;
    document.onmouseup = stopResize;
    e.stopPropagation();
    e.preventDefault();
}

function onResize(e) {
    if (!resizeState) return;
    const dx = e.clientX - resizeState.ox;
    const dy = e.clientY - resizeState.oy;
    const el = elements.find(ev => ev.id === resizeState.id);
    if (!el) return;
    const p = resizeState.pos;
    if (p.includes('e')) { el.w = Math.max(20, resizeState.ew + dx); }
    if (p.includes('w')) { el.w = Math.max(20, resizeState.ew - dx); el.x = resizeState.ex + dx; }
    if (p.includes('s')) { el.h = Math.max(20, resizeState.eh + dy); }
    if (p.includes('n')) { el.h = Math.max(20, resizeState.eh - dy); el.y = resizeState.ey + dy; }
    render();
}

function stopResize() {
    if (resizeState) markDirty();
    resizeState = null;
    document.onmousemove = null;
    document.onmouseup = null;
}

// ── Properties Panel ──────────────────────────────────────
function updateProps() {
    const panel = document.getElementById('propsPanel');
    const el = elements.find(e => e.id === selectedId);
    if (!el) {
        panel.innerHTML = '<div class="empty-state">Select an element to edit its properties</div>';
        return;
    }

    let html = '';
    html += '<div class="prop-group"><label>Name</label><input value="' + escapeHtml(el.name) + '" onchange="updateEl(\'' + el.id + '\',\'name\',this.value)"></div>';
    html += '<div class="prop-row">';
    html += '<div class="prop-group"><label>X</label><input type="number" value="' + Math.round(el.x) + '" onchange="updateElNum(\'' + el.id + '\',\'x\',this.value)"></div>';
    html += '<div class="prop-group"><label>Y</label><input type="number" value="' + Math.round(el.y) + '" onchange="updateElNum(\'' + el.id + '\',\'y\',this.value)"></div>';
    html += '</div><div class="prop-row">';
    html += '<div class="prop-group"><label>W</label><input type="number" value="' + Math.round(el.w) + '" onchange="updateElNum(\'' + el.id + '\',\'w\',this.value)"></div>';
    html += '<div class="prop-group"><label>H</label><input type="number" value="' + Math.round(el.h) + '" onchange="updateElNum(\'' + el.id + '\',\'h\',this.value)"></div>';
    html += '</div>';
    html += '<div class="prop-group"><label>Z-Index</label><input type="number" value="' + el.zIndex + '" onchange="updateElNum(\'' + el.id + '\',\'zIndex\',this.value)"></div>';
    html += '<div class="prop-group"><label>Tags</label><input value="' + escapeHtml(el.tags || '') + '" placeholder="e.g. type=fire slot=1 main" onchange="updateEl(\'' + el.id + '\',\'tags\',this.value)"></div>';

    const colors = ['#ffffff','#000000','#ff3333','#ff8833','#ffdd33','#33ff33','#33ddff','#3388ff','#9933ff','#ff33cc','#ff6666','#8B4513','#c8a882','#a0c4ff'];
    const colorKey = el.type === 'image' ? 'imgColor' : 'color';
    const curColor = el.type === 'image' ? (el.imgColor || '#ffffff') : el.color;

    if (el.type === 'image') {
        html += '<div class="prop-group"><label>Image URL</label><input value="' + escapeHtml(el.src) + '" placeholder="Drag from assets or paste URL" onchange="updateEl(\'' + el.id + '\',\'src\',this.value)"></div>';
        html += '<div class="prop-group"><label>Tint Color</label><div class="color-picker">';
        colors.forEach(c => {
            html += '<button style="background:' + c + '"' + (curColor === c ? ' class="active"' : '') + ' onclick="updateEl(\'' + el.id + '\',\'imgColor\',\'' + c + '\')"></button>';
        });
        html += '</div><input value="' + curColor + '" style="margin-top:4px;width:100%" onchange="updateEl(\'' + el.id + '\',\'imgColor\',this.value)"></div>';
    } else if (el.type === 'text') {
        html += '<div class="prop-group"><label>Text</label><textarea onchange="updateEl(\'' + el.id + '\',\'text\',this.value)">' + escapeHtml(el.text) + '</textarea></div>';
        html += '<div class="prop-row">';
        html += '<div class="prop-group"><label>Font</label><select onchange="updateEl(\'' + el.id + '\',\'font\',this.value)">' +
            ['Arial','Verdana','Tahoma','Trebuchet MS','Times New Roman','Georgia','Courier New','Impact','Comic Sans MS'].map(f =>
                '<option' + (el.font === f ? ' selected' : '') + '>' + f + '</option>'
            ).join('') + '</select></div>';
        html += '<div class="prop-group"><label>Size</label><input type="number" value="' + el.size + '" onchange="updateElNum(\'' + el.id + '\',\'size\',this.value)"></div>';
        html += '</div><div class="prop-row">';
        html += '<div class="prop-group"><label><input type="checkbox"' + (el.bold ? ' checked' : '') + ' onchange="updateElBool(\'' + el.id + '\',\'bold\',this.checked)"> Bold</label></div>';
        html += '<div class="prop-group"><label><input type="checkbox"' + (el.italic ? ' checked' : '') + ' onchange="updateElBool(\'' + el.id + '\',\'italic\',this.checked)"> Italic</label></div>';
        html += '<div class="prop-group"><label>Align</label><select onchange="updateEl(\'' + el.id + '\',\'align\',this.value)">' +
            ['left','center','right'].map(a => '<option' + (el.align === a ? ' selected' : '') + '>' + a + '</option>'
        ).join('') + '</select></div>';
        html += '</div><div class="prop-group"><label>Color</label><div class="color-picker">';
        colors.forEach(c => {
            html += '<button style="background:' + c + '"' + (curColor === c ? ' class="active"' : '') + ' onclick="updateEl(\'' + el.id + '\',\'color\',\'' + c + '\')"></button>';
        });
        html += '</div><input value="' + curColor + '" style="margin-top:4px;width:100%" onchange="updateEl(\'' + el.id + '\',\'color\',this.value)"></div>';
    }

    html += '<div style="margin-top:8px;"><button onclick="deleteElement(\'' + el.id + '\')" style="background:#662222;color:#ff8888;border:1px solid #884444;padding:4px 12px;border-radius:3px;cursor:pointer;">Delete</button></div>';
    panel.innerHTML = html;
}

function updateEl(id, key, val) {
    const el = elements.find(e => e.id === id);
    if (el) { el[key] = val; render(); markDirty(); }
}

function updateElNum(id, key, val) {
    const el = elements.find(e => e.id === id);
    if (el) { el[key] = parseFloat(val) || 0; render(); markDirty(); }
}

function updateElBool(id, key, val) {
    const el = elements.find(e => e.id === id);
    if (el) { el[key] = val; render(); markDirty(); }
}

function deleteElement(id) {
    elements = elements.filter(e => e.id !== id);
    if (selectedId === id) selectedId = null;
    render();
    markDirty();
}

// ── Layers Panel ──────────────────────────────────────────
function updateLayers() {
    const panel = document.getElementById('layerPanel');
    if (elements.length === 0) {
        panel.innerHTML = '<div style="color:#3a4a6a;font-size:12px;padding:8px;">No elements</div>';
        return;
    }
    const sorted = [...elements].sort((a,b) => b.zIndex - a.zIndex);
    let html = '';
    sorted.forEach(el => {
        html += '<div class="layer-item' + (el.id === selectedId ? ' active' : '') + '" onclick="selectElement(\'' + el.id + '\')">';
        if (el.type === 'image' && el.src) {
            html += '<img class="thumb" src="' + el.src + '" onerror="this.style.display=\'none\'">';
        } else {
            html += '<div class="thumb" style="background:#2a3050;display:flex;align-items:center;justify-content:center;font-size:10px;color:#7a8aaa;">T</div>';
        }
        html += '<span class="label">' + escapeHtml(el.name || el.id) + '</span>';
        html += '<span class="btn" onclick="event.stopPropagation();moveLayerUp(\'' + el.id + '\')">&#x25B2;</span>';
        html += '<span class="btn" onclick="event.stopPropagation();moveLayerDown(\'' + el.id + '\')">&#x25BC;</span>';
        html += '<span class="btn" onclick="event.stopPropagation();deleteElement(\'' + el.id + '\')">&#x2715;</span>';
        html += '</div>';
    });
    panel.innerHTML = html;
}

function moveLayerUp(id) {
    const el = elements.find(e => e.id === id);
    if (el) { el.zIndex = Math.min(9999, el.zIndex + 1); render(); markDirty(); }
}

function moveLayerDown(id) {
    const el = elements.find(e => e.id === id);
    if (el) { el.zIndex = Math.max(1, el.zIndex - 1); render(); markDirty(); }
}

// ── Export ────────────────────────────────────────────────
function exportXML() {
    let xml = '<!-- TTS UI Designer Export -->\n';
    elements.forEach(el => {
        if (el.tags) {
            xml += '<!-- Tags: ' + escapeXml(el.tags) + ' -->\n';
        }
        if (el.type === 'image' && el.src) {
            const assetName = el.name.replace(/[^a-zA-Z0-9_]/g,'_');
            const color = el.imgColor && el.imgColor !== '#ffffff' ? el.imgColor : '#FFFFFF';
            xml += '<Button id="' + el.id + '" rectAlignment="MiddleCenter" offsetXY="' + Math.round(el.x - 960) + ' ' + Math.round(el.y - 540) + '" width="' + Math.round(el.w) + '" height="' + Math.round(el.h) + '" image="' + assetName + '" color="' + color + '" />\n';
        } else if (el.type === 'text') {
            const style = [];
            if (el.bold) style.push('Bold');
            if (el.italic) style.push('Italic');
            xml += '<Text id="' + el.id + '" rectAlignment="MiddleCenter" offsetXY="' + Math.round(el.x - 960) + ' ' + Math.round(el.y - 540) + '" width="' + Math.round(el.w) + '" height="' + Math.round(el.h) + '" fontSize="' + el.size + '" fontStyle="' + style.join('|') + '" color="' + el.color + '" alignment="Middle' + el.align.charAt(0).toUpperCase() + el.align.slice(1) + '">' + escapeXml(el.text) + '</Text>\n';
        }
    });
    showCode(xml);
}

function exportLua() {
    let lua = '-- TTS UI Designer Export\n';
    elements.forEach(el => {
        if (el.tags) {
            lua += '-- Tags: ' + el.tags + '\n';
        }
        if (el.type === 'image' && el.src) {
            const assetName = el.name.replace(/[^a-zA-Z0-9_]/g,'_');
            const color = el.imgColor && el.imgColor !== '#ffffff' ? (', color="' + el.imgColor + '"') : '';
            lua += 'UI.createButton("' + el.id + '", { rectAlignment="MiddleCenter", offsetXY={' + Math.round(el.x - 960) + ',' + Math.round(el.y - 540) + '}, width=' + Math.round(el.w) + ', height=' + Math.round(el.h) + ', image="' + assetName + '"' + color + ' })\n';
        } else if (el.type === 'text') {
            const style = [];
            if (el.bold) style.push('Bold');
            if (el.italic) style.push('Italic');
            lua += 'UI.createText("' + el.id + '", "' + escapeLua(el.text) + '", { rectAlignment="MiddleCenter", offsetXY={' + Math.round(el.x - 960) + ',' + Math.round(el.y - 540) + '}, width=' + Math.round(el.w) + ', height=' + Math.round(el.h) + ', fontSize=' + el.size + ', fontStyle="' + style.join('|') + '", color="' + el.color + '", alignment="Middle' + el.align.charAt(0).toUpperCase() + el.align.slice(1) + '" })\n';
        }
    });
    showCode(lua);
}

function resolveSrc(el) {
    if (el.src && !el.src.startsWith('data:')) return el.src;
    const name = el.name || '';
    if (name.startsWith('type_')) {
        return GIT_BASE + '/Pokemon%20Assets/Types/' + name.replace('type_', '') + '.png';
    }
    const panel = PANELS.find(p => p.name === name);
    if (panel) return GIT_BASE + '/' + panel.file;
    if (name.match(/^\d{3}_/)) {
        return GIT_BASE + '/Pokemon%20Assets/Slot%20Images/' + name + '.png';
    }
    return el.src || '';
}

function canReconstructSrc(el) {
    if (el.type !== 'image') return false;
    const name = el.name || '';
    if (name.startsWith('type_')) return true;
    if (PANELS.find(p => p.name === name)) return true;
    if (name.match(/^\d{3}_/)) return true;
    return false;
}

function stripElement(el) {
    const copy = Object.assign({}, el);
    if (copy.type === 'image' && copy.src && canReconstructSrc(copy)) {
        delete copy.src;
    }
    if (!copy.tags) delete copy.tags;
    if (copy.imgColor === '#ffffff') delete copy.imgColor;
    return copy;
}

function copyData() {
    const data = JSON.stringify(getLayoutData());
    navigator.clipboard.writeText(data).then(() => {
        alert('Layout data copied! (' + data.length + ' chars)');
    }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = data;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('Layout data copied! (' + data.length + ' chars)');
    });
}

function pasteData() {
    const input = prompt('Paste layout JSON data:');
    if (!input) return;
    try {
        const obj = JSON.parse(input);
        if (!obj.elements || !Array.isArray(obj.elements)) {
            alert('Invalid layout data: missing elements array.');
            return;
        }
        applyLayoutData(obj);
        markDirty();
        alert('Layout loaded from pasted data (' + elements.length + ' elements)!');
    } catch(e) {
        alert('Failed to parse layout data: ' + e.message);
    }
}

function showCode(code) {
    const w = window.open('', '_blank', 'width=800,height=600');
    w.document.write('<html><head><title>Exported Code</title><style>body{background:#1a1a2e;color:#e0e0e0;font-family:monospace;padding:20px;white-space:pre-wrap;font-size:13px;}</style></head><body>' + escapeHtml(code) + '</body></html>');
    w.document.close();
}

// ── Save/Load ─────────────────────────────────────────────
function saveLayout() {
    const data = JSON.stringify({ elements, nextId, canvasW: document.getElementById('canvasW').value, canvasH: document.getElementById('canvasH').value, _timestamp: new Date().toISOString() });
    localStorage.setItem('tts_designer_layout', data);
    dirty = false;
    setStatus(STATUS.SYNCED, 'Saved to storage');
    alert('Layout saved to browser storage!');
}

function loadLayout() {
    const data = localStorage.getItem('tts_designer_layout');
    if (!data) { alert('No saved layout found.'); return; }
    try {
        const obj = JSON.parse(data);
        applyLayoutData(obj);
        markDirty();
        alert('Layout loaded from storage (' + elements.length + ' elements)!');
    } catch(e) { alert('Failed to load layout.'); }
}

// ── File Save/Load ─────────────────────────────────────────
function getLayoutData() {
    return {
        elements: elements.map(stripElement),
        nextId,
        canvasW: document.getElementById('canvasW').value,
        canvasH: document.getElementById('canvasH').value,
        _timestamp: new Date().toISOString(),
        _version: '2.0'
    };
}

function saveToFile() {
    const data = JSON.stringify(getLayoutData(), null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'tts_layout.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

function loadFromFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const obj = JSON.parse(e.target.result);
            if (!obj.elements || !Array.isArray(obj.elements)) {
                alert('Invalid layout file: missing elements array.');
                return;
            }
            applyLayoutData(obj);
            markDirty();
            alert('Layout loaded from file (' + elements.length + ' elements)!');
        } catch(err) {
            alert('Failed to parse layout file: ' + err.message);
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

function clearCanvas() {
    if (!confirm('Clear all elements?')) return;
    elements = [];
    nextId = 1;
    selectedId = null;
    render();
    markDirty();
}

// ── Helpers ───────────────────────────────────────────────
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeXml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeLua(s) { return String(s).replace(/\\/g,'\\\\').replace(/"/g,'\\"'); }

// ── Keyboard shortcuts ────────────────────────────────────
document.onkeydown = e => {
    if (e.key === 'Delete' || e.key === 'Backspace') {
        if (selectedId && !e.target.matches('input,textarea,select')) {
            deleteElement(selectedId);
        }
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        saveLayout();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
    }
};

// ── Init ──────────────────────────────────────────────────
initAssets();
loadPokemonList();
resizeCanvas();
setupLiveSave();
updateElementCount();
</script>
